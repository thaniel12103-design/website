<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join - Rebel Fitness Studio</title>
  <link rel="stylesheet" href="website.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body class="join-page">

<header>
  <h1>REBEL FITNESS STUDIO</h1>
  <a href="website.html" class="back-home">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>
</header>

<section class="join-form">
  <h2>Join Rebel Fitness Studio</h2>

  <form onsubmit="submitJoinForm(event)">

    <input type="text" id="name" placeholder="Full Name" required>

    <input type="email" id="email" placeholder="Email" required>

    <input type="tel" id="phone" placeholder="Phone Number" required>

    <select id="plan">
      <option>Basic</option>
      <option>Standard</option>
      <option>Premium</option>
    </select>

    <button type="submit">Confirm Membership</button>

    <p id="successMsg"></p>

  </form>
</section>

<script src="website.js"></script>
</body>
</html>
